# ==============================================================================
# LASPA ANPR Camera Ingestion Portal - Nginx Configuration
# ==============================================================================
# 
# This configuration file defines Nginx as a reverse proxy for the Express
# backend API and WebSocket server, and configures static serving for the 
# React frontend client and uploaded images.
#
# To use this configuration:
# 1. Copy or link this file to /etc/nginx/sites-available/laspa-anpr
# 2. Enable the site: ln -s /etc/nginx/sites-available/laspa-anpr /etc/nginx/sites-enabled/
# 3. Test config syntax: nginx -t
# 4. Restart Nginx: systemctl restart nginx

upstream backend_server {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _; # Adjust this to your camera network IP or domain (e.g. 192.168.168.100)

    # Maximum request size - important as cameras can upload high-resolution images
    client_max_body_size 50M;

    # Gzip Compression for improved frontend loading times
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # --------------------------------------------------------------------------
    # 1. Frontend Dashboard - Static React Client SPA
    # --------------------------------------------------------------------------
    location / {
        # Replace this with the absolute path to your frontend/dist directory
        root /var/www/laspa-anpr/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # --------------------------------------------------------------------------
    # 2. Uploads Directory - Served directly by Nginx for high performance
    # --------------------------------------------------------------------------
    location /uploads/ {
        # Replace this with the absolute path to your backend/uploads directory
        # Ensure trailing slash is included!
        alias /var/www/laspa-anpr/backend/uploads/;
        
        # Enable client caching for static images
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        
        # Safety/Security measures for uploaded folder
        autoindex off;
        
        # Prevent execution of CGI/scripts from uploads folder
        location ~* \.(php|pl|py|jsp|sh|cgi)$ {
            deny all;
        }
    }

    # --------------------------------------------------------------------------
    # 3. Express API Endpoints
    # --------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;
        
        # HTTP Headers to pass client info to backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keepalive parameters
        proxy_set_header Connection "";

        # Timeouts for camera upload processing
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # --------------------------------------------------------------------------
    # 4. Backend Health Check
    # --------------------------------------------------------------------------
    location /health {
        proxy_pass http://backend_server/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off; # Avoid spamming access logs with health checks
    }

    # --------------------------------------------------------------------------
    # 5. WebSocket Endpoints for Live ANPR Dashboard Feed
    # --------------------------------------------------------------------------
    location /ws {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        
        # Upgrade header options for WebSockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        # Proxy settings
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts to avoid connection dropping frequently
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        # Turn off buffering for WebSockets
        proxy_buffering off;
    }
}
