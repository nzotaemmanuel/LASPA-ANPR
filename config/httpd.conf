# ==============================================================================
# LASPA ANPR Camera Ingestion Portal - Apache Configuration (Windows)
# ==============================================================================
# 
# This configuration file defines Apache VirtualHost configs for the 
# React frontend and reverse proxying to the Node.js Express server.
#
# Prerequisite Apache modules that MUST be enabled:
# - mod_proxy
# - mod_proxy_http
# - mod_proxy_wstunnel
# - mod_rewrite
# - mod_alias
#

<VirtualHost *:8000>
    ServerName localhost

    # --------------------------------------------------------------------------
    # Document Root - React Static Client SPA
    # --------------------------------------------------------------------------
    DocumentRoot "C:/Users/HP/OneDrive/Emmanuel Docs/Bell International Limited/LASPA/LASPA-MicroCam-02/frontend/dist"

    <Directory "C:/Users/HP/OneDrive/Emmanuel Docs/Bell International Limited/LASPA/LASPA-MicroCam-02/frontend/dist">
        Options FollowSymLinks
        AllowOverride All
        Require all granted

        # Rewrite engine for SPA client-side routing (redirect all non-file/dir requests to index.html)
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    # --------------------------------------------------------------------------
    # Static uploads folder - Served directly by Apache for high speed
    # --------------------------------------------------------------------------
    Alias /uploads/ "C:/Users/HP/OneDrive/Emmanuel Docs/Bell International Limited/LASPA/LASPA-MicroCam-02/backend/uploads/"

    <Directory "C:/Users/HP/OneDrive/Emmanuel Docs/Bell International Limited/LASPA/LASPA-MicroCam-02/backend/uploads/">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # Disable executing CGI/PHP scripts inside the uploads directory
        <FilesMatch "\.(php|pl|py|jsp|sh|cgi)$">
            Require all denied
        </FilesMatch>
    </Directory>

    # --------------------------------------------------------------------------
    # Maximum upload size - 50MB (Important for large camera image uploads)
    # --------------------------------------------------------------------------
    LimitRequestBody 52428800

    # --------------------------------------------------------------------------
    # Reverse Proxy Config
    # --------------------------------------------------------------------------
    ProxyRequests Off
    ProxyPreserveHost On

    # Setup connection reuse and keepalives for upstream requests
    <Proxy "*">
        Require all granted
    </Proxy>

    # WebSocket Proxying (using mod_proxy_wstunnel)
    # The RewriteRule below routes websocket requests matching /ws or carrying 
    # Upgrade: websocket headers to the backend WebSocket port (5000)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/ws(.*) ws://127.0.0.1:5000$1 [P,L]

    # Health Check Endpoint
    ProxyPass /health http://127.0.0.1:5000/health
    ProxyPassReverse /health http://127.0.0.1:5000/health

    # API Proxying
    # Forward all /api/ traffic to the backend node application
    ProxyPass /api/ http://127.0.0.1:5000/api/
    ProxyPassReverse /api/ http://127.0.0.1:5000/api/

    # --------------------------------------------------------------------------
    # Logs and Troubleshooting
    # --------------------------------------------------------------------------
    ErrorLog "logs/laspa-anpr-error.log"
    CustomLog "logs/laspa-anpr-access.log" combined
</VirtualHost>
